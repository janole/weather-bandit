title: Weather Outlook
description: Cross-validated daily weather outlooks from Open-Meteo.
# For a GitHub Pages project site at https://<user>.github.io/<repo>/,
# set this to "/<repo>". Leave empty for a user/org site or custom domain.
baseurl: ""
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
permalink: pretty
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "outlooks"
    values:
      layout: outlook
